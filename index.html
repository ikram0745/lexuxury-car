<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Selling Webpage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Model Store</h1>
    <nav>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#gallery">Gallery</a></li>
        <li><a href="#care">Care</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section id="home" class="hero">
    <h2>Beautiful Models, Smooth Experience</h2>
    <p>Get exclusive discounts with our code below!</p>
    <button id="discountBtn">Reveal Discount</button>
    <p id="discountCode" class="hidden">DISCOUNT2026</p>
  </section>

  <!-- Gallery with Flexbox/Grid -->
  <section id="gallery" class="gallery">
    <div class="grid-item"><img src="https://picsum.photos/300?random=1" alt="Model 1"></div>
    <div class="grid-item"><img src="https://picsum.photos/300?random=2" alt="Model 2"></div>
    <div class="grid-item"><img src="https://picsum.photos/300?random=3" alt="Model 3"></div>
    <div class="grid-item"><img src="https://picsum.photos/300?random=4" alt="Model 4"></div>
  </section>

  <!-- Care Section -->
  <section id="care" class="care">
    <h2>Care Instructions</h2>
    <p>Keep your models clean and store them safely.</p>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="contact">
    <h2>Contact Us</h2>
    <form>
      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Your Email">
      <textarea placeholder="Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Model Store. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
